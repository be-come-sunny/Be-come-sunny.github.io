<!DOCTYPE html>
<html>
 
<head>
    <title>我的网站</title>
    <link rel="stylesheet" href="styles.css">
</head>
 
<body>
    <header>
        <h1>欢迎</h1>
    </header>
    <main>
        <p>这是一个段落</p>
        <ul>
            <li>列表项 1</li>
        </ul>
        <button id="myButton">点击我</button>
    </main>
</body>
<script>
// 获取按钮元素
const myButton = document.getElementById('myButton');
 
// 为按钮添加点击事件监听器
myButton.addEventListener('click', function () {
    alert('你点击了按钮！');
});
</script>
 
</html>
