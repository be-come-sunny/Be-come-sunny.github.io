<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线观看</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }
        
        .question {
            font-size: 2rem;
            color: #333;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-in-out;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .jump-btn {
            background: #FFD700;
            color: #333;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            position: relative;
            overflow: hidden;
        }
        
        .jump-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 215, 0, 0.6);
            background: #ffcc00;
        }
        
        .jump-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        
        .jump-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        
        .jump-btn:hover::after {
            transform: translateX(100%);
        }
        
        .image-wrapper {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        
        .online-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            letter-spacing: 3px;
            animation: glow 2s infinite alternate;
        }
        
        .image-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            animation: scaleAnimation 1.5s infinite alternate ease-in-out;
            transition: all 0.5s ease;
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
        }
        
        .video-container {
            display: none;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background: #000;
        }
        
        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes scaleAnimation {
            0% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); }
            to { text-shadow: 0 0 20px #ffcc00, 0 0 30px #ffcc00; }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 15px;
            }
            
            .question {
                font-size: 1.6rem;
                margin-bottom: 30px;
            }
            
            .jump-btn {
                font-size: 1.5rem;
                padding: 16px 40px;
            }
            
            .online-text {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px 10px;
            }
            
            .question {
                font-size: 1.3rem;
                margin-bottom: 25px;
            }
            
            .jump-btn {
                font-size: 1.2rem;
                padding: 14px 35px;
            }
            
            .online-text {
                font-size: 1.5rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页内容 -->
        <div id="home-page">
            <div class="question">是否打开另一个网站？</div>
            <button class="jump-btn">跳转</button>
        </div>
        
        <!-- 图片页内容（默认隐藏） -->
        <div id="image-page" style="display: none;">
            <div class="image-wrapper">
                <div class="online-text">在线观看</div>
                <div class="image-container">
                    <img src="https://xjimage.qq.com/5c45cd4a4d962f9fe15183fbd9232807.gif" alt="动态图片">
                </div>
            </div>
            <div class="video-container">
                <video controls>
                    <source src="https://upos-sz-mirrorali.bilivideo.com/upgcxcode/99/91/137649199/137649199_da2-1-192.mp4?e=ig8euxZM2rNcNbNM7wdVhwdlhbKMhwdVhoNvNC8BqJIzNbfq9rVEuxTEnE8L5F6VnEsSTx0vkX8fqJeYTj_lta53NCM=&uipk=5&nbs=1&deadline=1748843591&gen=playurlv2&os=alibv&oi=2018263300&trid=9698ca16f0824ab194d506ee2e1a1c99T&mid=3546883406432665&platform=html5&og=cos&upsig=8b79cc921e8c689d8caf0c5c62cf5175&uparams=e,uipk,nbs,deadline,gen,os,oi,trid,mid,platform,og&bvc=vod&nettype=0&bw=244006&orderid=0,1&buvid=&build=0&mobi_app=&f=T_0_0&logo=80000000" type="video/mp4">
                    您的浏览器不支持视频播放。
                </video>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 页面元素
            const homePage = document.getElementById('home-page');
            const imagePage = document.getElementById('image-page');
            const jumpButton = document.querySelector('.jump-btn');
            const imageContainer = document.querySelector('.image-container');
            const videoContainer = document.querySelector('.video-container');
            const videoPlayer = document.querySelector('video');
            
            // 跳转到图片页面
            jumpButton.addEventListener('click', function() {
                homePage.style.display = 'none';
                imagePage.style.display = 'block';
                
                // 添加图片缩放动画
                imageContainer.style.animation = 'scaleAnimation 1.5s infinite alternate ease-in-out';
            });
            
            // 图片点击事件 - 播放视频
            imageContainer.addEventListener('click', function() {
                imageContainer.style.display = 'none';
                videoContainer.style.display = 'block';
                
                // 播放视频
                videoPlayer.play();
            });
            
            // 动态改变图片大小
            setInterval(() => {
                const scale = 0.95 + Math.random() * 0.1;
                imageContainer.style.transform = `scale(${scale})`;
            }, 1000);
        });
    </script>
</body>
</html>
